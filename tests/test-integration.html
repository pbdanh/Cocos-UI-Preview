// ═══ MockNode ═══
function MockNode(w, h) {
    this._size = { width: w || 0, height: h || 0 };
    this._pos  = { x: 0, y: 0 };
    this._anchor = { x: 0.5, y: 0.5 };
    this._children = [];
    this._name = '';
    this._margin = undefined;
    this._flex = undefined;
    this._alignSelf = undefined;
    this._visible = true;
}
MockNode.prototype.getContentSize = function() { return {width: this._size.width, height: this._size.height}; };
MockNode.prototype.setContentSize = function(w, h) {
    if (typeof w === 'object') { this._size.width = w.width; this._size.height = w.height; }
    else { this._size.width = w; this._size.height = h; }
};
MockNode.prototype.getPosition = function() { return {x: this._pos.x, y: this._pos.y}; };
MockNode.prototype.setPosition = function(x, y) {
    if (typeof x === 'object') { this._pos.x = x.x; this._pos.y = x.y; }
    else { this._pos.x = x; this._pos.y = y; }
};
MockNode.prototype.getAnchorPoint = function() { return {x: this._anchor.x, y: this._anchor.y}; };
MockNode.prototype.setAnchorPoint = function(x, y) { this._anchor.x = x; this._anchor.y = y; };
MockNode.prototype.getChildren = function() { return this._children; };
MockNode.prototype.addChild = function(c) { this._children.push(c); };
MockNode.prototype.setName = function(n) { this._name = n; };
MockNode.prototype.getName = function() { return this._name; };
MockNode.prototype.isVisible = function() { return this._visible; };
MockNode.prototype.setVisible = function(v) { this._visible = v; };
MockNode.prototype.getParent = function() { return null; };
MockNode.prototype.setLocalZOrder = function() {};
MockNode.prototype.setScale = function(s) { this._scaleX = s; this._scaleY = s; };
MockNode.prototype.setScaleX = function(s) { this._scaleX = s; };
MockNode.prototype.setScaleY = function(s) { this._scaleY = s; };
MockNode.prototype.getScaleX = function() { return this._scaleX || 1; };
MockNode.prototype.getScaleY = function() { return this._scaleY || 1; };
MockNode.prototype.setRotation = function() {};
MockNode.prototype.setOpacity = function() {};

<!-- ═══ Load engine + runtime ═══ -->
<script src="../layout-engine/_layout_engine.js"></script>

<script>
try {

var TOLERANCE = 1.5;
var totalTests = 0, passedTests = 0, failedTests = 0;
var resultsHTML = '';

function approxEq(a, b) { return Math.abs(a - b) <= TOLERANCE; }

// ═══ Engine: build tree + compute layout → flatten to {name: {x,y,w,h}} ═══
function runEngine(json) {
    var engine = new LayoutEngine();
    engine.buildTree(json);
    var rootW = engine._root.width || 0;
    var rootH = engine._root.height || 0;
    engine.computeLayout(rootW, rootH);
    return engine._root;
}

function flattenEngine(node, out) {
    out = out || {};
    if (node.name) {
        out[node.name] = {
            x: node._x, y: node._y, w: node._width, h: node._height,
            sx: node._scaleX || 1, sy: node._scaleY || 1
        };
    }
    if (node.children) {
        for (var i = 0; i < node.children.length; i++) {
            flattenEngine(node.children[i], out);
        }
    }
    return out;
}

// ═══ Runtime: MockNode container + UIBuilder arrange ═══
function runRuntime(layout, parentW, parentH) {
    var container = new MockNode(parentW, parentH);
    container.setName('container');
    var children = layout.children || [];

    for (var i = 0; i < children.length; i++) {
        var c = children[i];
        var child = new MockNode(c.width || 100, c.height || 100);
        child.setName(c.name || 'child_' + i);
        if (c.anchor) child.setAnchorPoint(c.anchor[0], c.anchor[1]);
        if (c.margin !== undefined) child._margin = c.margin;
        if (c.flex !== undefined) child._flex = c.flex;
        if (c.alignSelf !== undefined) child._alignSelf = c.alignSelf;
        if (c.percentWidth !== undefined) child._percentWidth = c.percentWidth;
        if (c.percentHeight !== undefined) child._percentHeight = c.percentHeight;
        container.addChild(child);
    }

    var opts = {};
    if (layout.gap !== undefined) opts.gap = layout.gap;
    if (layout.alignItems) opts.alignItems = layout.alignItems;
    if (layout.justifyContent) opts.justifyContent = layout.justifyContent;
    if (layout.padding) opts.padding = layout.padding;

    var dir = layout.flexDirection || 'row';
    if (layout.layoutType === 'Grid') {
        opts.columns = layout.columns;
        if (layout.spacingX !== undefined) opts.spacingX = layout.spacingX;
        else if (layout.gap !== undefined) { opts.spacingX = layout.gap; opts.spacingY = layout.gap; }
        if (layout.spacingY !== undefined) opts.spacingY = layout.spacingY;
        UIBuilder.arrangeAsGrid(container, opts);
    } else if (layout.layoutType === 'Wrap') {
        UIBuilder.arrangeAsWrap(container, opts);
    } else if (dir === 'column' || dir === 'column-reverse') {
        if (dir === 'column-reverse') opts.reverse = true;
        UIBuilder.arrangeAsColumn(container, opts);
    } else {
        if (dir === 'row-reverse') opts.reverse = true;
        UIBuilder.arrangeAsRow(container, opts);
    }

    var results = {};
    var mocks = container.getChildren();
    for (var i = 0; i < mocks.length; i++) {
        var mc = mocks[i];
        var pos = mc.getPosition();
        var size = mc.getContentSize();
        results[mc.getName()] = { x: pos.x, y: pos.y, w: size.width, h: size.height };
    }
    return results;
}

// ═══ Engine for scaleMode tests: wrap in root + Absolute parent ═══
function runEngineScaleMode(parentW, parentH, childSpec) {
    var json = [{
        name: 'root', width: parentW, height: parentH,
        children: [childSpec]
    }];
    var engine = new LayoutEngine();
    engine.buildTree(json);
    engine.computeLayout(parentW, parentH);
    var flat = flattenEngine(engine._root);
    return flat;
}

// ═══ Reporting ═══
function compareAndReport(testName, enginePos, runtimePos, childNames, extraCols) {
    totalTests++;
    var rows = '';
    var allPass = true;
    var cols = ['x', 'y', 'w', 'h'];
    if (extraCols) cols = cols.concat(extraCols);

    for (var i = 0; i < childNames.length; i++) {
        var name = childNames[i];
        var eng = enginePos[name];
        var rt = runtimePos[name];
        if (!eng || !rt) {
            rows += '<tr><td>' + name + '</td><td colspan="' + cols.length + '" class="fail-cell">MISSING (eng=' + !!eng + ' rt=' + !!rt + ')</td></tr>';
            allPass = false;
            continue;
        }
        var cells = '';
        for (var ci = 0; ci < cols.length; ci++) {
            var k = cols[ci];
            var eV = eng[k] !== undefined ? eng[k] : 0;
            var rV = rt[k] !== undefined ? rt[k] : 0;
            var ok = approxEq(eV, rV);
            if (!ok) allPass = false;
            var cls = ok ? 'pass-cell' : 'fail-cell';
            cells += '<td class="' + cls + '">' + eV.toFixed(1) + ' / ' + rV.toFixed(1) + (ok ? ' ✅' : ' ❌ Δ' + Math.abs(eV-rV).toFixed(1)) + '</td>';
        }
        rows += '<tr><td>' + name + '</td>' + cells + '</tr>';
    }

    if (allPass) passedTests++; else failedTests++;
    var icon = allPass ? '✅' : '❌';
    resultsHTML += '<h2 style="color:' + (allPass ? '#81c784' : '#e57373') + '; margin:14px 0 6px; font-size:15px;">' + icon + ' Test ' + totalTests + ': <span class="test-title">' + testName + '</span></h2>';
    var thLabels = cols.map(function(c) { return c.toUpperCase() + ' (eng/rt)'; });
    resultsHTML += '<table><tr><th>Node</th>' + thLabels.map(function(l) { return '<th>' + l + '</th>'; }).join('') + '</tr>' + rows + '</table>';
}

function compareScaleMode(testName, enginePos, expected, childNames) {
    totalTests++;
    var rows = '';
    var allPass = true;
    var cols = ['x', 'y', 'w', 'h', 'sx', 'sy'];

    for (var i = 0; i < childNames.length; i++) {
        var name = childNames[i];
        var eng = enginePos[name];
        var exp = expected[name];
        if (!eng || !exp) {
            rows += '<tr><td>' + name + '</td><td colspan="6" class="fail-cell">MISSING</td></tr>';
            allPass = false;
            continue;
        }
        var cells = '';
        for (var ci = 0; ci < cols.length; ci++) {
            var k = cols[ci];
            var eV = eng[k] !== undefined ? eng[k] : (k === 'sx' || k === 'sy' ? 1 : 0);
            var xV = exp[k] !== undefined ? exp[k] : (k === 'sx' || k === 'sy' ? 1 : 0);
            var ok = approxEq(eV, xV);
            if (!ok) allPass = false;
            var cls = ok ? 'pass-cell' : 'fail-cell';
            cells += '<td class="' + cls + '">' + eV.toFixed(2) + ' / ' + xV.toFixed(2) + (ok ? ' ✅' : ' ❌ Δ' + Math.abs(eV-xV).toFixed(2)) + '</td>';
        }
        rows += '<tr><td>' + name + '</td>' + cells + '</tr>';
    }

    if (allPass) passedTests++; else failedTests++;
    var icon = allPass ? '✅' : '❌';
    resultsHTML += '<h2 style="color:' + (allPass ? '#81c784' : '#e57373') + '; margin:14px 0 6px; font-size:15px;">' + icon + ' Test ' + totalTests + ': <span class="test-title">' + testName + '</span></h2>';
    resultsHTML += '<table><tr><th>Node</th><th>X (eng/exp)</th><th>Y (eng/exp)</th><th>W (eng/exp)</th><th>H (eng/exp)</th><th>ScaleX (eng/exp)</th><th>ScaleY (eng/exp)</th></tr>' + rows + '</table>';
}

// Wrap child in Absolute parent for engine
function makeEngineJSON(pW, pH, layout) {
    var copy = JSON.parse(JSON.stringify(layout));
    copy.width = pW;
    copy.height = pH;
    copy.name = 'container';
    return [{ name: 'root', width: pW, height: pH, children: [copy] }];
}

function addCategory(title) {
    resultsHTML += '<div class="category">' + title + '</div>';
}
